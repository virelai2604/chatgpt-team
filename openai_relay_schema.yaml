openapi: 3.1.0
info:
  title: ChatGPT Team Relay
  version: 1.4
servers:
  - url: https://chatgpt-team.pages.dev
paths:
  /v1/chat/completions:
    post: { summary: Legacy Chat Completions (pass-through), operationId: createChatCompletion, requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true } } } }, responses: { "200": { description: ok, content: { application/json: { schema: { type: object, additionalProperties: true } } } } } }
  /v1/responses:
    post:
      summary: OpenAI Responses API (recommended; supports background)
      operationId: createResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              properties:
                model: { type: string }
                input:
                  oneOf:
                    - type: string
                    - type: array
                      items: { type: object }
                background: { type: boolean, description: "Run in background and poll via GET /v1/responses/{id} or resume with stream=true" }
              additionalProperties: true
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
  /v1/responses/{id}:
    get:
      summary: Get status/result for a background response
      operationId: getResponse
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }, { name: stream, in: query, required: false, schema: { type: boolean } }]
      responses: { "200": { description: ok, content: { application/json: { schema: { type: object, additionalProperties: true } }, text/event-stream: { schema: { type: string, description: "SSE stream" } } } } }
  /v1/background:
    post:
      summary: Compatibility shim that forwards to /v1/responses with background=true
      operationId: createBackgroundJob
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses: { "200": { description: ok, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
  /v1/embeddings:
    post: { summary: Embeddings, operationId: createEmbedding, requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true } } } }, responses: { "200": { description: ok, content: { application/json: { schema: { type: object, additionalProperties: true } } } } } }
  /v1/images/generations:
    post: { summary: Images, operationId: createImage, requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true } } } }, responses: { "200": { description: ok, content: { application/json: { schema: { type: object, additionalProperties: true } } } } } }
  /v1/audio/speech:
    post: { summary: Text-to-Speech, operationId: createSpeech, requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true } } } }, responses: { "200": { description: audio bytes } } }
  /v1/audio/transcriptions:
    post: { summary: Speech-to-Text (multipart/form-data), operationId: createTranscription, requestBody: { required: true, content: { multipart/form-data: { schema: { type: object, additionalProperties: true } } } }, responses: { "200": { description: ok, content: { application/json: { schema: { type: object, additionalProperties: true } } } } } }
  /v1/audio/translations:
    post: { summary: Speech-to-Text translate (multipart/form-data), operationId: createTranslation, requestBody: { required: true, content: { multipart/form-data: { schema: { type: object, additionalProperties: true } } } }, responses: { "200": { description: ok, content: { application/json: { schema: { type: object, additionalProperties: true } } } } } }
  /v1/files:
    get: { summary: List files, operationId: listFiles, responses: { "200": { description: ok, content: { application/json: { schema: { type: object, additionalProperties: true } } } } } }
    post: { summary: Upload file (multipart/form-data), operationId: uploadFile, requestBody: { required: true, content: { multipart/form-data: { schema: { type: object, additionalProperties: true } } } }, responses: { "200": { description: ok, content: { application/json: { schema: { type: object, additionalProperties: true } } } } } }
  /v1/files/{file_id}:
    get: { summary: Retrieve file, operationId: retrieveFile, parameters: [{ name: file_id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: ok } } }
    delete: { summary: Delete file, operationId: deleteFile, parameters: [{ name: file_id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: ok } } }
  /v1/vector-stores:
    get: { summary: List vector stores, operationId: listVectorStores, responses: { "200": { description: ok } } }
    post: { summary: Create vector store, operationId: createVectorStore, requestBody: { required: false }, responses: { "200": { description: ok } } }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
security: [ { bearerAuth: [] } ]
