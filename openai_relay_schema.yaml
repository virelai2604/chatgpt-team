openapi: 3.1.0
info:
  title: ChatGPT Relay Full Schema
  version: 1.0.0
servers:
- url: https://chatgpt-team.pages.dev
paths:
  /v1/responses:
    post:
      summary: Responses API – unified chat / assistant interface
      description: Uses `input` array instead of `messages` (per OpenAI Responses API)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                input:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [user, assistant, system, developer]
                      content:
                        type: string
              required:
                - model
                - input
      responses:
        '200':
          description: Valid Responses API outcome

  /v1/models:
    get:
      summary: List available models
      responses:
        '200':
          description: Array of model objects    /v1/vector_stores/{vector_store_id}/search:
    post:
      summary: Search vector store
      parameters:
      - name: vector_store_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                filters:
                  type: object
                max_num_results:
                  type: integer
      responses:
        '200':
          description: Vector search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorSearchResult'
  /v1/vector_stores/{vector_store_id}/files:
    post:
      summary: Attach file to vector store
      parameters:
      - name: vector_store_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file_id:
                  type: string
                attributes:
                  type: object
      responses:
        '200':
          description: File attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorStoreFileAttachment'
    get:
      summary: List files in vector store
      parameters:
      - name: vector_store_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: List of files in vector store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorStoreFileList'
  /v1/assistants:
    post:
      summary: Create an assistant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Assistant created
          content:
            application/json:
              schema:
                type: object
  /v1/threads:
    post:
      summary: Create a thread
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Thread created
          content:
            application/json:
              schema:
                type: object
  /v1/files:upload:
    post:
      summary: Upload file
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  type: string
              required:
              - file
              - purpose
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
  /v1/files:
    post:
      summary: Upload a file
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  type: string
              required:
              - file
              - purpose
      responses:
        '200':
          description: File uploaded
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    VectorSearchResult:
      type: object
      properties:
        object:
          type: string
        search_query:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              file_id:
                type: string
              filename:
                type: string
              score:
                type: number
              attributes:
                type: object
              content:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    text:
                      type: string
        has_more:
          type: boolean
        next_page:
          type: string
    VectorStoreFileAttachment:
      type: object
      properties:
        vector_store_id:
          type: string
        file_id:
          type: string
        attributes:
          type: object
    VectorStoreFileList:
      type: object
      properties:
        vector_store_id:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              file_id:
                type: string
              filename:
                type: string
              attributes:
                type: object
    ChatCompletionRequest:
      type: object
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
            required:
            - role
            - content
      required:
      - model
      - messages
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization

