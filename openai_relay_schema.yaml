openapi: 3.1.0
info:
  title: Cloudflare → OpenAI Relay
  version: 1.5.1
  description: Cloudflare Pages relay that proxies /v1/* to OpenAI with server-side auth and CORS.
servers:
  - url: https://chatgpt-team.pages.dev
    description: Production (Pages)
  - url: http://localhost:8788
    description: Local (wrangler pages dev)

components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearer: []

paths:
  /v1/models:
    get:
      summary: List models
      operationId: listModels
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/chat/completions:
    post:
      summary: Chat Completions
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
