openapi: 3.1.0
info:
  title: OpenAI Relay (Full SDK Surface + Custom)
  version: 1.0.0
servers:
  - url: https://chatgpt-team.pages.dev/v1
paths:
  /health:
    get: { summary: Relay Health, responses: { "200": { description: OK } } }
  /health-rt:
    get: { summary: Worker Health, responses: { "200": { description: OK } } }
  /background:
    get: { summary: Background Health, responses: { "200": { description: OK } } }
  /models:
    get: { summary: List Models, responses: { "200": { description: OK } } }
  /completions:
    post: { summary: Legacy Completions, responses: { "200": { description: OK } } }
  /chat/completions:
    post: { summary: Create Chat Completion, responses: { "200": { description: OK } } }
  /responses:
    post: { summary: Create Response, responses: { "200": { description: OK } } }
  /embeddings:
    post: { summary: Create Embedding, responses: { "200": { description: OK } } }
  /files:
    get: { summary: List Files, responses: { "200": { description: OK } } }
    post: { summary: Upload File, responses: { "200": { description: OK } } }
  /files/{file_id}:
    get: { summary: Retrieve File, responses: { "200": { description: OK } } }
    delete: { summary: Delete File, responses: { "200": { description: OK } } }
  /files/{file_id}/content:
    get: { summary: Download File Content, responses: { "200": { description: OK } } }
  /fine-tunes:
    get: { summary: List Fine-Tunes, responses: { "200": { description: OK } } }
    post: { summary: Create Fine-Tune, responses: { "200": { description: OK } } }
  /fine-tunes/{fine_tune_id}:
    get: { summary: Retrieve Fine-Tune, responses: { "200": { description: OK } } }
  /fine-tunes/{fine_tune_id}/cancel:
    post: { summary: Cancel Fine-Tune, responses: { "200": { description: OK } } }
  /assistants:
    get: { summary: List Assistants, responses: { "200": { description: OK } } }
    post: { summary: Create Assistant, responses: { "200": { description: OK } } }
  /assistants/{assistant_id}:
    get: { summary: Retrieve Assistant, responses: { "200": { description: OK } } }
    post: { summary: Modify Assistant, responses: { "200": { description: OK } } }
    delete: { summary: Delete Assistant, responses: { "200": { description: OK } } }
  /threads:
    post: { summary: Create Thread, responses: { "200": { description: OK } } }
  /threads/{thread_id}:
    get: { summary: Retrieve Thread, responses: { "200": { description: OK } } }
  /threads/{thread_id}/messages:
    get: { summary: List Thread Messages, responses: { "200": { description: OK } } }
    post: { summary: Create Thread Message, responses: { "200": { description: OK } } }
  /threads/{thread_id}/messages/{message_id}:
    get: { summary: Retrieve Thread Message, responses: { "200": { description: OK } } }
  /threads/{thread_id}/runs:
    post: { summary: Create Run, responses: { "200": { description: OK } } }
  /threads/{thread_id}/runs/{run_id}:
    get: { summary: Retrieve Run, responses: { "200": { description: OK } } }
  /images/generations:
    post: { summary: Generate Image, responses: { "200": { description: OK } } }
  /audio/speech:
    post: { summary: Generate Speech (TTS), responses: { "200": { description: OK } } }
  /audio/transcriptions:
    post: { summary: Transcribe Audio, responses: { "200": { description: OK } } }
  /audio/translations:
    post: { summary: Translate Audio, responses: { "200": { description: OK } } }
  /moderations:
    post: { summary: Moderations (blocked by relay), responses: { "403": { description: Blocked } } }
  /realtime:
    get: { summary: Realtime WebSocket, responses: { "101": { description: Switching Protocols } } }
