openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: ChatGPT-Team Relay (Cloudflare Pages → OpenAI)
  version: 1.3.0
servers:
  - url: https://chatgpt-team.pages.dev
    description: Cloudflare Pages relay
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearer: []
paths:
  /v1/responses:
    post:
      operationId: createResponse
      summary: Unified Responses (text, tools, multimodal)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model]
              properties:
                model: { type: string }
                input:
                  oneOf:
                    - { type: string }
                    - { type: object }
                    - { type: array }
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role: { type: string, enum: [system, user, assistant, tool] }
                      content:
                        oneOf:
                          - { type: string }
                          - { type: array, items: { type: object } }
      responses: { "200": { description: OK } }

  /v1/embeddings:
    post:
      operationId: createEmbedding
      summary: Embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              properties:
                model: { type: string }
                input:
                  oneOf:
                    - { type: string }
                    - { type: array, items: { type: string } }
      responses: { "200": { description: OK } }

  /v1/models:
    get:
      operationId: listModels
      summary: List models
      responses: { "200": { description: OK } }

  /v1/audio/speech:
    post:
      operationId: textToSpeech
      summary: TTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input, voice]
              properties:
                model: { type: string }
                input: { type: string }
                voice: { type: string }
      responses:
        "200":
          description: MP3/OGG/WAV audio
          content:
            audio/mpeg: { schema: { type: string, format: binary } }
            application/octet-stream: { schema: { type: string, format: binary } }

  /v1/audio/transcriptions:
    post:
      operationId: speechToText
      summary: STT
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, model]
              properties:
                file: { type: string, format: binary }
                model: { type: string }
                language: { type: string }
      responses: { "200": { description: OK } }

  /v1/images/generations:
    post:
      operationId: imageGenerate
      summary: Image generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, prompt]
              properties:
                model: { type: string }
                prompt: { type: string }
                size: { type: string, enum: ["1024x1024","1024x1792","1792x1024"] }
                response_format: { type: string, enum: [url, b64_json] }
      responses: { "200": { description: OK } }

  /v1/files:
    get:
      operationId: listFiles
      summary: List files
      responses: { "200": { description: OK } }
    post:
      operationId: uploadFile
      summary: Upload file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, purpose]
              properties:
                file: { type: string, format: binary }
                purpose: { type: string, description: "OpenAI file purpose (e.g., user_data, fine-tune, assistants, batch, responses)" }
      responses: { "200": { description: OK } }

  /v1/files/{file_id}:
    delete:
      operationId: deleteFile
      summary: Delete file
      parameters:
        - in: path
          name: file_id
          required: true
          schema: { type: string }
      responses: { "200": { description: OK } }

  /v1/files/{file_id}/content:
    get:
      operationId: getFileContent
      summary: Download file
      parameters:
        - in: path
          name: file_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: File bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }

  # Assistants (minimal)
  /v1/assistants:
    post:
      operationId: createAssistant
      summary: Create assistant
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses: { "200": { description: OK } }
    get:
      operationId: listAssistants
      summary: List assistants
      responses: { "200": { description: OK } }

  /v1/assistants/{assistant_id}:
    post:
      operationId: modifyAssistant
      summary: Modify assistant
      parameters:
        - in: path
          name: assistant_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses: { "200": { description: OK } }

  /v1/threads:
    post:
      operationId: createThread
      summary: Create thread
      responses: { "200": { description: OK } }

  /v1/threads/{thread_id}/messages:
    post:
      operationId: createMessage
      summary: Add message to thread
      parameters:
        - in: path
          name: thread_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses: { "200": { description: OK } }

  /v1/threads/{thread_id}/runs:
    post:
      operationId: createRun
      summary: Create run
      parameters:
        - in: path
          name: thread_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses: { "200": { description: OK } }







