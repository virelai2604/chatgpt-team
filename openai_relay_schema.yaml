---
openapi: 3.1.0
info:
  title: OpenAI Relay
  version: 1.0.0
  description: |
    Routes ChatGPT requests to OpenAI's /v1/chat/completions endpoint via a
    Cloudflare Worker. The worker attaches the Authorization and
    OpenAI-Organization headers on the server side.
servers:
  - url: https://chatgpt-team.pages.dev  # Cloudflare Worker base URL
    description: Cloudflare Worker Relay
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: API key for OpenAI (prefixed with "Bearer ")
security:
  - ApiKeyAuth: []
paths:
  /v1/chat/completions:
    post:
      summary: Relay to OpenAI Chat Completions
      description: |
        Forwards a chat completion request to OpenAI's API. The Cloudflare Worker
        adds the required OpenAI authentication and organization headers.
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              description: OpenAI Chat Completions request payload
              type: object
              additionalProperties: true  # Accepts any OpenAI JSON fields
      responses:
        "200":
          description: OpenAI response forwarded through the relay
          content:
            application/json:
              schema:
                description: OpenAI Chat Completions response
                type: object
                additionalProperties: true  # Pass‑through of OpenAI response
