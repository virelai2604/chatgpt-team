openapi: 3.1.0
info:
  title: ChatGPT Team Relay
  version: 1.6
servers:
  - url: https://chatgpt-team.pages.dev
paths:
  /v1/responses:
    post:
      summary: OpenAI Responses API (create; supports background)
      operationId: createResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              properties:
                model: { type: string }
                input:
                  oneOf:
                    - type: string
                    - type: array
                      items: { type: object }
                background: { type: boolean, description: "If true, returns a queued id to poll later." }
              additionalProperties: true
      responses:
        "200":
          description: Response created
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /v1/responses/{id}:
    get:
      summary: Get response status/result
      operationId: getResponse
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Response status/result
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
