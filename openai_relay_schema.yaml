openapi: 3.1.0
info:
  title: ChatGPT Relay Full Schema
  version: 1.0.0
servers:
  - url: https://chatgpt-team.pages.dev

paths:
  /v1/models:
    get:
      summary: List available models
      responses:
        '200':
          description: Array of model objects

  /v1/chat/completions:
    post:
      summary: Chat Completions (standard OpenAI)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Chat response

  /v1/responses:
    post:
      summary: Responses API – Chat + Assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantRequest'
      responses:
        '200':
          description: Response from assistant/chat

  /v1/audio/transcriptions:
    post:
      summary: Audio Transcription
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Transcription result

  /v1/audio/speech:
    post:
      summary: Convert text to speech (TTS)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                input:
                  type: string
              required:
                - model
                - input
      responses:
        '200':
          description: Audio stream

  /v1/images/generations:
    post:
      summary: Generate image from prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                n:
                  type: integer
                size:
                  type: string
              required:
                - prompt
      responses:
        '200':
          description: Image data returned

  /v1/files:
    post:
      summary: Upload a file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  type: string
              required:
                - file
                - purpose
      responses:
        '200':
          description: File uploaded
    get:
      summary: List files
      responses:
        '200':
          description: File list

  /v1/files/{file_id}:
    get:
      summary: Retrieve file metadata
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: File info

  /v1/files/{file_id}/content:
    get:
      summary: Retrieve file content
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: File stream

  /v1/assistants:
    post:
      summary: Create an assistant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantRequest'
      responses:
        '200':
          description: Assistant created

  /v1/threads:
    post:
      summary: Create a thread
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantRequest'
      responses:
        '200':
          description: Thread created

  /v1/vector_stores/{vector_store_id}/search:
    post:
      summary: Search vector store
      parameters:
        - name: vector_store_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                filters:
                  type: object
                max_num_results:
                  type: integer
              required:
                - query
      responses:
        '200':
          description: Vector search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorSearchResult'

  /v1/vector_stores/{vector_store_id}/files:
    post:
      summary: Attach file to vector store
      parameters:
        - name: vector_store_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file_id:
                  type: string
                attributes:
                  type: object
              required:
                - file_id
      responses:
        '200':
          description: File attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorStoreFileAttachment'

    get:
      summary: List files in vector store
      parameters:
        - name: vector_store_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorStoreFileList'

components:
  schemas:
    ChatCompletionRequest:
      type: object
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
            required:
              - role
              - content
      required:
        - model
        - messages

    AssistantRequest:
      type: object
      properties:
        model:
          type: string
        input:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
            required:
              - role
              - content
      required:
        - model
        - input

    VectorSearchResult:
      type: object
      properties:
        object:
          type: string
        search_query:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              file_id:
                type: string
              filename:
                type: string
              score:
                type: number
              attributes:
                type: object
              content:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    text:
                      type: string
        has_more:
          type: boolean
        next_page:
          type: string

    VectorStoreFileAttachment:
      type: object
      properties:
        vector_store_id:
          type: string
        file_id:
          type: string
        attributes:
          type: object

    VectorStoreFileList:
      type: object
      properties:
        vector_store_id:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              file_id:
                type: string
              filename:
                type: string
              attributes:
                type: object

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization