openapi: 3.1.0
info:
  title: ChatGPT Relay Full Schema (SDK-aligned)
  version: 1.0.0
servers:
  - url: https://chatgpt-team.pages.dev

paths:
  /v1/models:
    get: { summary: List available models, responses: { '200': { description: Array of model objects } } }

  /v1/completions:
    post: { summary: Legacy text completions, responses: { '200': { description: Legacy completion } } }

  /v1/edits:
    post: { summary: Edit stored prompt or text, responses: { '200': { description: Edit result } } }

  /v1/chat/completions:
    post: { summary: Chat Completion (ChatML), responses: { '200': { description: Chat output } } }

  /v1/responses:
    post: { summary: Unified assistant/chat endpoint, responses: { '200': { description: SSE or JSON reply } } }

  /v1/fine_tuning/jobs:
    get: { summary: List fine-tune jobs, responses: { '200': { description: All jobs } } }
    post: { summary: Start fine-tune job, responses: { '200': { description: Job created } } }

  /v1/fine_tuning/jobs/{fine_tuning_job_id}:
    get: { summary: Retrieve job metadata, responses: { '200': { description: Job info } } }

  /v1/fine_tuning/jobs/{fine_tuning_job_id}/events:
    get: { summary: Read fine-tune events, responses: { '200': { description: Events } } }

  /v1/files:
    get: { summary: List files, responses: { '200': { description: All files } } }
    post: { summary: Upload file, responses: { '200': { description: File created } } }

  /v1/files/{file_id}:
    get: { summary: Fetch file info, responses: { '200': { description: Metadata } } }

  /v1/files/{file_id}/content:
    get: { summary: Download file, responses: { '200': { description: File stream } } }

  /v1/images/generations:
    post: { summary: Generate image from prompt, responses: { '200': { description: b64 image(s) or URLs } } }

  /v1/images/variations:
    post: { summary: Generate image variations, responses: { '200': { description: b64 image(s) or URLs } } }

  /v1/images/edits:
    post: { summary: Edit image via mask, responses: { '200': { description: b64 image(s) or URLs } } }

  /v1/audio/transcriptions:
    post: { summary: Transcribe speech file, responses: { '200': { description: Transcript } } }

  /v1/audio/translations:
    post: { summary: Translate speech to English, responses: { '200': { description: Translation } } }

  /v1/audio/speech:
    post: { summary: TTS - Generate speech from text, responses: { '200': { description: Audio stream or file } } }

  /v1/assistants:
    post: { summary: Create a new assistant }

  /v1/assistants/{assistant_id}:
    get: { summary: Get assistant information }

  /v1/threads:
    post: { summary: Start new thread, responses: { '200': { description: Created thread } } }

  /v1/threads/{thread_id}:
    get: { summary: Get thread state }

  /v1/threads/{thread_id}/messages:
    post: { summary: Submit message to thread }

  /v1/threads/{thread_id}/runs:
    post: { summary: Launch a run via tool/assistant }

  /v1/threads/{thread_id}/runs/{run_id}:
    get: { summary: Check run status }

  /v1/threads/{thread_id}/runs/{run_id}/steps:
    get: { summary: Fetch run steps }

  /v1/vector_stores:
    post: { summary: Create vector store }

  /v1/vector_stores/{vector_store_id}:
    get: { summary: Get metadata }

  /v1/vector_stores/{vector_store_id}/files:
    get: { summary: List files in store }
    post: { summary: Associate file to vector store }

  /v1/vector_stores/{vector_store_id}/search:
    post: { summary: Perform vector similarity search }

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization