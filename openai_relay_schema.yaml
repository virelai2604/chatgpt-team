openapi: 3.1.0
info:
  title: OpenAI Relay
  version: 1.0.0
  description: |
    Routes ChatGPT requests to OpenAI's /v1/chat/completions endpoint via a
    Cloudflare Worker. The worker attaches the required OpenAI API key and
    organization ID headers on the server side.
servers:
  - url: https://chatgpt-team.pages.dev
    description: Cloudflare Worker Relay

paths:
  /v1/chat/completions:
    post:
      summary: Relay to OpenAI Chat Completions
      description: |
        Forwards a chat completion request to OpenAI's API. The Cloudflare Worker
        adds the required OpenAI authentication and organization headers.
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        "200":
          description: OpenAI response forwarded through the relay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'


# ---- added endpoints ----
  /v1/responses:
    post:
      summary: Relay to OpenAI Responses API
      description: Unified endpoint for text, tools, and more (pass-through to OpenAI).
      operationId: createResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              additionalProperties: true
      responses:
        "200":
          description: Responses API JSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/embeddings:
    post:
      summary: Relay to OpenAI Embeddings
      description: Creates embedding vectors for search/RAG.
      operationId: createEmbedding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              additionalProperties: true
      responses:
        "200":
          description: Embedding vector response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

# ---- added endpoints (no moderation) ----
  /v1/models:
    get:
      summary: List models (pass-through)
      operationId: listModels
      responses:
        "200":
          description: Models list
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/audio/speech:
    post:
      summary: Text-to-Speech (pass-through)
      operationId: createSpeech
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, voice, input]
              properties:
                model: { type: string, description: "e.g., gpt-4o-mini-tts" }
                voice: { type: string, description: "e.g., alloy" }
                input: { type: string }
                format: { type: string, description: "e.g., mp3, wav" }
              additionalProperties: true
      responses:
        "200":
          description: Binary audio
          content:
            audio/mpeg: { schema: { type: string, format: binary } }
            application/octet-stream: { schema: { type: string, format: binary } }

  /v1/audio/transcriptions:
    post:
      summary: Speech-to-Text (pass-through)
      operationId: createTranscription
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [model, file]
              properties:
                model: { type: string, description: "e.g., gpt-4o-mini-transcribe or whisper-1" }
                file:  { type: string, format: binary }
              additionalProperties: true
      responses:
        "200":
          description: Transcription JSON
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/images/generations:
    post:
      summary: Image generation (pass-through)
      operationId: createImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, prompt]
              properties:
                model:  { type: string, description: "e.g., gpt-image-1" }
                prompt: { type: string }
                size:   { type: string, description: "e.g., 256x256, 1024x1024" }
                response_format: { type: string, description: "e.g., b64_json" }
              additionalProperties: true
      responses:
        "200":
          description: Image JSON
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/images/edits:
    post:
      summary: Image edit (pass-through)
      operationId: editImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [model, image, prompt]
              properties:
                model:  { type: string }
                image:  { type: string, format: binary }
                mask:   { type: string, format: binary }
                prompt: { type: string }
              additionalProperties: true
      responses:
        "200":
          description: Image JSON
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/images/variations:
    post:
      summary: Image variation (pass-through)
      operationId: varyImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [model, image]
              properties:
                model:  { type: string }
                image:  { type: string, format: binary }
              additionalProperties: true
      responses:
        "200":
          description: Image JSON
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/files:
    get:
      summary: List files (pass-through)
      operationId: listFiles
      responses:
        "200":
          description: Files list
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: API key for OpenAI (prefixed with 'Bearer ')
  schemas:
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          description: system, user, assistant, or tool
          enum: [system, user, assistant, tool]
        content:
          type: string
          description: Message text
        name:
          type: string
          description: Optional speaker name
      additionalProperties: false

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          description: OpenAI model ID (e.g., gpt-4o, gpt-5, gpt-5-mini)
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        temperature:
          type: number
          minimum: 0
          maximum: 2
        stream:
          type: boolean
        tools:
          type: array
          items:
            type: object
            description: Tool definitions passed through to OpenAI
      additionalProperties: true

    Choice:
      type: object
      properties:
        index:
          type: integer
        message:
          $ref: '#/components/schemas/ChatMessage'
        finish_reason:
          type: string
        logprobs:
          nullable: true
      additionalProperties: true

    Usage:
      type: object
      properties:
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        total_tokens: { type: integer }
      additionalProperties: true

    ChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id:
          type: string
        object:
          type: string
          description: Typically 'chat.completion'
        created:
          type: integer
          description: Unix timestamp (seconds)
        model:
          type: string
        choices:
          type: array
          items:
            $ref: '#/components/schemas/Choice'
        usage:
          $ref: '#/components/schemas/Usage'
        system_fingerprint:
          type: string
      additionalProperties: true

security:
  - ApiKeyAuth: []


