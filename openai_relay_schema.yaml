openapi: 3.1.0
info:
  title: ChatGPT Relay Full Schema (SDK-aligned)
  version: 2.0.0
servers:
  - url: https://chatgpt-team.pages.dev

paths:
  /v1/models:
    get:
      summary: List available models
      responses:
        '200':
          description: Array of model objects

  /v1/chat/completions:
    post:
      summary: Modern Chat Completion with tool calling
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Chat result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'

  /v1/responses:
    post:
      summary: Streamable response via SSE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantRequest'
      responses:
        '200':
          description: SSE or final chat result

  /v1/assistants:
    post:
      summary: Create assistant
      responses:
        '200':
          description: Assistant object

  /v1/assistants/{assistant_id}:
    get:
      summary: Fetch assistant details
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Assistant info

  /v1/threads:
    post:
      summary: Start thread
      responses:
        '200':
          description: Thread created

  /v1/threads/{thread_id}/messages:
    post:
      summary: Add user message to thread
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Message added

  /v1/threads/{thread_id}/runs:
    post:
      summary: Start a tool-calling run
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Run started

  /v1/threads/{thread_id}/runs/{run_id}/steps:
    get:
      summary: Fetch execution steps
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Steps array

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization

  schemas:
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          type: string
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"

    ToolCall:
      type: object
      properties:
        id:
          type: string
          description: Unique ID
        type:
          type: string
          enum: [function]
        function:
          $ref: '#/components/schemas/FunctionCall'

    FunctionCall:
      type: object
      required: [name, arguments]
      properties:
        name:
          type: string
        arguments:
          type: string

    ToolDefinition:
      type: object
      required: [type, function]
      properties:
        type:
          type: string
          enum: [function]
        function:
          type: object
          required: [name, parameters]
          properties:
            name:
              type: string
            parameters:
              type: object
              additionalProperties: true

    ChatCompletionRequest:
      type: object
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDefinition'
        tool_choice:
          oneOf:
            - type: string
              enum: [none, auto]
            - type: object
              properties:
                type:
                  type: string
                function:
                  $ref: "#/components/schemas/FunctionCall"
      required: [model, messages]
      additionalProperties: true

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              message:
                $ref: "#/components/schemas/ChatMessage"
              finish_reason:
                type: string

    AssistantRequest:
      type: object
      properties:
        model:
          type: string
        input:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required: [model, input]
      additionalProperties: true
