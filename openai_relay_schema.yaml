openapi: 3.1.0
info:
  title: OpenAI Relay
  version: 1.0.0
  description: |
    Routes ChatGPT requests to OpenAI's /v1/chat/completions endpoint via a
    Cloudflare Worker. The worker attaches the required OpenAI API key and
    organization ID headers on the server side.
servers:
  - url: https://chatgpt-team.pages.dev
    description: Cloudflare Worker Relay

paths:
  /v1/chat/completions:
    post:
      summary: Relay to OpenAI Chat Completions
      description: |
        Forwards a chat completion request to OpenAI's API. The Cloudflare Worker
        adds the required OpenAI authentication and organization headers.
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        "200":
          description: OpenAI response forwarded through the relay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: API key for OpenAI (prefixed with 'Bearer ')
  schemas:
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          description: system, user, assistant, or tool
          enum: [system, user, assistant, tool]
        content:
          type: string
          description: Message text
        name:
          type: string
          description: Optional speaker name
      additionalProperties: false

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          description: OpenAI model ID (e.g., gpt-4o, gpt-5, gpt-5-mini)
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        temperature:
          type: number
          minimum: 0
          maximum: 2
        stream:
          type: boolean
        tools:
          type: array
          items:
            type: object
            description: Tool definitions passed through to OpenAI
      additionalProperties: true

    Choice:
      type: object
      properties:
        index:
          type: integer
        message:
          $ref: '#/components/schemas/ChatMessage'
        finish_reason:
          type: string
        logprobs:
          nullable: true
      additionalProperties: true

    Usage:
      type: object
      properties:
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        total_tokens: { type: integer }
      additionalProperties: true

    ChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id:
          type: string
        object:
          type: string
          description: Typically 'chat.completion'
        created:
          type: integer
          description: Unix timestamp (seconds)
        model:
          type: string
        choices:
          type: array
          items:
            $ref: '#/components/schemas/Choice'
        usage:
          $ref: '#/components/schemas/Usage'
        system_fingerprint:
          type: string
      additionalProperties: true

security:
  - ApiKeyAuth: []

# ---- added endpoints ----
  /v1/responses:
    post:
      summary: Relay to OpenAI Responses API
      description: Unified endpoint for text, tools, and more (pass-through to OpenAI).
      operationId: createResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              additionalProperties: true
      responses:
        "200":
          description: Responses API JSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/embeddings:
    post:
      summary: Relay to OpenAI Embeddings
      description: Creates embedding vectors for search/RAG.
      operationId: createEmbedding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              additionalProperties: true
      responses:
        "200":
          description: Embedding vector response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
