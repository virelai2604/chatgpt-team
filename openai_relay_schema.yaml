openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Cloudflare → OpenAI Relay
  version: 1.4.0
  description: >
    Catch-all relay for OpenAI's /v1/* endpoints. Authorization is injected at the edge.
servers:
  - url: https://chatgpt-team.pages.dev
    description: Cloudflare Pages relay
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearer: []
paths:
  /v1/responses:
    post:
      operationId: createResponse
      summary: OpenAI Responses (unified)
      description: Pass-through to OpenAI Responses API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model]
              properties:
                model: { type: string }
                input:
                  oneOf:
                    - { type: string }
                    - { type: array, items: { type: object, additionalProperties: true } }
                messages:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/embeddings:
    post:
      operationId: createEmbedding
      summary: Embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              properties:
                model: { type: string }
                input:
                  oneOf:
                    - { type: string }
                    - { type: array, items: { type: string } }
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/models:
    get:
      operationId: listModels
      summary: List models
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/audio/speech:
    post:
      operationId: textToSpeech
      summary: TTS (text → audio)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input, voice]
              properties:
                model: { type: string }
                input: { type: string }
                voice: { type: string }
                format: { type: string }
              additionalProperties: true
      responses:
        "200":
          description: Audio stream
          content:
            audio/mpeg: { schema: { type: string, format: binary } }
            application/octet-stream: { schema: { type: string, format: binary } }

  /v1/audio/transcriptions:
    post:
      operationId: speechToText
      summary: STT (audio → text)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, model]
              properties:
                file: { type: string, format: binary }
                model: { type: string }
                language: { type: string }
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/images/generations:
    post:
      operationId: imageGenerate
      summary: Image generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, prompt]
              properties:
                model: { type: string }
                prompt: { type: string }
                size:
                  type: string
                  enum: ["1024x1024","1024x1792","1792x1024"]
                response_format:
                  type: string
                  enum: [url, b64_json]
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/files:
    get:
      operationId: listFiles
      summary: List files
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
    post:
      operationId: uploadFile
      summary: Upload file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, purpose]
              properties:
                file: { type: string, format: binary }
                purpose:
                  type: string
                  description: assistants or fine-tune (others may be restricted)
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/files/{file_id}:
    delete:
      operationId: deleteFile
      summary: Delete file
      parameters:
        - in: path
          name: file_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/files/{file_id}/content:
    get:
      operationId: getFileContent
      summary: Download file bytes
      parameters:
        - in: path
          name: file_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: File bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }

  /v1/assistants:
    post:
      operationId: createAssistant
      summary: Create assistant (Assistants v2)
      description: Requires OpenAI-Beta: assistants=v2 (relay adds it automatically).
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
    get:
      operationId: listAssistants
      summary: List assistants (Assistants v2)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/assistants/{assistant_id}:
    post:
      operationId: modifyAssistant
      summary: Modify assistant (Assistants v2)
      parameters:
        - in: path
          name: assistant_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/threads:
    post:
      operationId: createThread
      summary: Create thread (Assistants v2)
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/threads/{thread_id}/messages:
    post:
      operationId: createMessage
      summary: Add message to thread (Assistants v2)
      parameters:
        - in: path
          name: thread_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /v1/threads/{thread_id}/runs:
    post:
      operationId: createRun
      summary: Create run (Assistants v2)
      parameters:
        - in: path
          name: thread_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

