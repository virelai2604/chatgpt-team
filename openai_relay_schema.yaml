openapi: 3.1.0
info:
  title: OpenAI Relay
  version: 1.0.0
  description: |
    Routes ChatGPT requests to OpenAI's /v1/chat/completions endpoint via a
    Cloudflare Worker. The worker attaches the required OpenAI API key and
    organization ID headers on the server side.
servers:
  - url: https://chatgpt-team.pages.dev
    description: Cloudflare Worker Relay
paths:
  /v1/chat/completions:
    post:
      summary: Relay to OpenAI Chat Completions
      description: |
        Forwards a chat completion request to OpenAI's API. The Cloudflare Worker
        adds the required OpenAI authentication and organization headers.
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - messages
              properties:
                model:
                  type: string
                  description: ID of the OpenAI model to use (e.g., gpt-3.5-turbo).
                messages:
                  type: array
                  description: The messages to generate chat completions for, in the chat format.
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                        description: The role of the message (e.g., system, user, or assistant).
                      content:
                        type: string
                        description: The content of the message.
                      name:
                        type: string
                        description: An optional name for the user or assistant (for multi-user chats).
              additionalProperties: true
      responses:
        "200":
          description: OpenAI response forwarded through the relay
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: OpenAI Chat Completions API response payload
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: API key for OpenAI (prefixed with 'Bearer ')
security:
  - ApiKeyAuth: []
