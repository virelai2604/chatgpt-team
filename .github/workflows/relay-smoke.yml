name: Relay Smoke

on:
  push:
  workflow_dispatch:
  # optional: nightly check
  # schedule:
  #   - cron: "0 18 * * *"  # 01:00 WIB

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RELAY_BASE: ${{ vars.RELAY_BASE }} # e.g. https://chatgpt-team.pages.dev/v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show config
        shell: pwsh
        run: |
          Write-Host "RELAY_BASE:" ($env:RELAY_BASE ?? "<not set>")

      - name: Run smoke tests (PowerShell)
        shell: pwsh
        run: |
          ./tools/relay-smoke.ps1

