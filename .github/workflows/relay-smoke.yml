name: Relay Smoke

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      BASE: https://chatgpt-team.pages.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnostics
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "PSVersion:"; $PSVersionTable
          Write-Host "Health:"; curl -sS $env:BASE/health
          Write-Host "Repo files (tools/):"
          if (Test-Path tools) { Get-ChildItem -Recurse tools | Format-List -Property FullName,Length } else { Write-Host "tools/ missing" }

      - name: Run smoke tests (PowerShell 7)
        shell: pwsh
        run: ./tools/relay-smoke.ps1 -Base $env:BASE -TimeoutSec 120