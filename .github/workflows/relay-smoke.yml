name: relay-smoke
on:
  push: { branches: [ main ] }
  workflow_dispatch: {}
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke
        shell: pwsh
        run: |
          ./tools/smoke-all.ps1 -BaseUrl "$RELAY_BASEURL" -NoClientAuth -Model gpt-4o-mini
        env:
          RELAY_BASEURL: ${{ secrets.RELAY_BASEURL }}
