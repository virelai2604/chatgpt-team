name: Deploy Realtime Worker
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Deploy the Worker from the "worker" subfolder.
      - name: Deploy (wrangler-action v3)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker     # <-- points at worker/wrangler.toml and _worker.ts
          command: deploy              # explicit; action defaults to deploy
