name: 🔁 Sync Live Models & SDK Gen

on:
  schedule:
    - cron: "0 3 */14 * *"  # ⏳ Every 2 weeks
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install CLI tools
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Fetch and pin live models
        shell: pwsh
        run: |
          $headers = @{ Authorization = "Bearer $env:OPENAI_KEY" }
          $resp = Invoke-RestMethod -Uri https://api.openai.com/v1/models -Headers $headers
          $resp | ConvertTo-Json -Depth 10 | Set-Content -LiteralPath "models_live.json" -Encoding UTF8

      - name: Generate TypeScript SDK client
        run: |
          openapi-generator-cli generate `
            -i openai_relay_schema.yaml `
            -g typescript-node `
            -o tools/sdk-typescript `
            --additional-properties=supportsES6=true,typescriptThreePlus=true,withSeparateModelsAndApi=true,snapshotVersion=true

      - name: Commit pinned model + SDK (optional)
        run: |
          git config user.name "relay-bot"
          git config user.email "relay@bots.noreply"
          git add models_live.json
          git add tools/sdk-typescript --all
          git commit -m "sync: pinned live models + regen SDK"
          git push
        continue-on-error: true