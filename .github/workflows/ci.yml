name: CI (Secrets + Tests)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for better detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install and run the gitleaks binary directly instead of the
      # gitleaks/gitleaks-action Marketplace action. A third-party action is
      # rejected at startup unless it is on the repo's allowed-actions list,
      # which fails the whole run before any job executes. A plain `run:` step
      # uses only GitHub-owned actions and is always permitted.
      - name: Run Gitleaks (binary)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Resolve the latest linux_x64 asset dynamically so we don't break on
          # a version/naming change. jq is preinstalled on ubuntu-latest.
          URL="$(curl -sSL -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux_x64\\.tar\\.gz$")) | .browser_download_url' \
            | head -n1)"
          if [ -z "${URL}" ] || [ "${URL}" = "null" ]; then
            echo "Could not resolve gitleaks download URL from the releases API." >&2
            exit 1
          fi
          echo "Downloading gitleaks from: ${URL}"

          curl -sSL -o gitleaks.tar.gz "${URL}"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version

          # Scan committed history. Config must exist at repo root.
          ./gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1

  tests:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install .
          else
            echo "No requirements.txt or pyproject.toml found; cannot install deps."
            exit 1
          fi

          # Ensure pytest exists even if not included in runtime deps
          pip install pytest

      - name: Run tests
        env:
          RELAY_AUTH_ENABLED: "false"
        run: |
          set -euo pipefail
          # Integration tests require a live relay (local uvicorn or Render).
          # Render auto-deploys on commit, so the unit gate here runs everything
          # else in-process against the FastAPI app.
          pytest -q -m "not integration"
