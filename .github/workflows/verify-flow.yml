name: verify-flow
on: { push: { branches: [ "main" ] }, workflow_dispatch: {} }
defaults: { run: { shell: pwsh } }
jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      REST_ROOT: https://chatgpt-team.pages.dev
      REST_BASE: https://chatgpt-team.pages.dev/v1
      REALTIME_PROBE: https://chatgpt-team-realtime.virelai.workers.dev/v1/realtime?model=gpt-4o-realtime-preview-2024-12-17
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          "REST_ROOT=$env:REST_ROOT"; "REST_BASE=$env:REST_BASE"; "REALTIME_PROBE=$env:REALTIME_PROBE" | Write-Host
          if (-not $env:OPENAI_API_KEY) { throw "OPENAI_API_KEY secret missing" }
      - name: Health (root)
        run: |
          $r = Invoke-RestMethod "$env:REST_ROOT/health" -TimeoutSec 15
          if (-not $r.ok) { throw "/health not ok" }
      - name: Health (/v1/health)
        run: |
          $r = Invoke-RestMethod "$env:REST_BASE/health" -TimeoutSec 15
          if (-not $r.ok) { throw "/v1/health not ok" }
      - name: Models
        run: |
          $h = @{ Authorization = "Bearer $env:OPENAI_API_KEY" }
          $m = Invoke-RestMethod "$env:REST_BASE/models" -Headers $h -TimeoutSec 30
          if ($m.data.Count -lt 1) { throw "No models returned" }
      - name: Chat pong
        run: |
          $h = @{ Authorization = "Bearer $env:OPENAI_API_KEY"; "Content-Type"="application/json" }
          $b = @{ model="gpt-4o-mini"; messages=@(@{role="user";content="Say 'pong'."}); max_tokens=5 } | ConvertTo-Json -Depth 6
          $c = Invoke-RestMethod "$env:REST_BASE/chat/completions" -Method POST -Headers $h -Body $b -TimeoutSec 30
          if ($c.choices[0].message.content -notmatch 'pong') { throw "no pong" }
      - name: Realtime 101
        run: |
          $k = [Convert]::ToBase64String((1..16 | % {Get-Random -Max 256}))
          $code = & "/usr/bin/curl" --http1.1 -m 2 --connect-timeout 1 -s -o /dev/null -w "%{http_code}" `
            -H "Connection: Upgrade" -H "Upgrade: websocket" -H "Sec-WebSocket-Version: 13" -H "Sec-WebSocket-Key: $k" `
            -H "Authorization: Bearer $env:OPENAI_API_KEY" "$env:REALTIME_PROBE"
          if ($code -ne "101") { throw "WS did not upgrade (got $code)" }  deploy-worker:
    needs: verify
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy realtime worker
        uses: cloudflare/wrangler-action@3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
