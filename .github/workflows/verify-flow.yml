name: verify-flow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  BASE: https://chatgpt-team.pages.dev/v1
  LIVE_ROOT: https://chatgpt-team.pages.dev
  REALTIME_BASE: https://chatgpt-team-realtime.virelai.workers.dev/v1
  CHAT_MODEL: gpt-4o-mini
  EMB_MODEL: text-embedding-3-small
  RT_MODEL: gpt-4o-realtime-preview-2024-12-17

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Ensure jq present
        run: |
          jq --version || sudo apt-get update && sudo apt-get install -y jq

      - name: Health (root + versioned)
        run: |
          set -euo pipefail
          curl -fsS "$LIVE_ROOT/health" | jq .
          curl -fsS "$BASE/health" | jq .

      - name: Models
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          curl -fsS -H "Authorization: Bearer $OPENAI_API_KEY" "$BASE/models" | jq -e '.data | length > 0' >/dev/null

      - name: Chat pong
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          jq -n --arg m "$CHAT_MODEL" \
                '{model:$m,messages:[{role:"user",content:"Say '\''pong'\''."}],max_tokens:8}' \
            | curl -fsS -H "Authorization: Bearer $OPENAI_API_KEY" \
                     -H "Content-Type: application/json" \
                     -d @- "$BASE/chat/completions" \
            | tee /tmp/chat.json
          jq -e '.choices[0].message.content | test("pong"; "i")' /tmp/chat.json >/dev/null

      - name: Embeddings
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          jq -n --arg m "$EMB_MODEL" '{model:$m, input:"hello world"}' \
            | curl -fsS -H "Authorization: Bearer $OPENAI_API_KEY" \
                     -H "Content-Type: application/json" \
                     -d @- "$BASE/embeddings" \
            | jq -e '.data[0].embedding | length > 100' >/dev/null

      - name: Files API (upload → download → delete)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          echo "hello from CI" > sample.txt
          up=$(curl -fsS -H "Authorization: Bearer $OPENAI_API_KEY" -F "file=@sample.txt" -F "purpose=assistants" "$BASE/files")
          fid=$(echo "$up" | jq -r '.id')
          test -n "$fid"
          curl -fsS -H "Authorization: Bearer $OPENAI_API_KEY" "$BASE/files/$fid/content" -o dl.txt
          test -s dl.txt
          curl -fsS -X DELETE -H "Authorization: Bearer $OPENAI_API_KEY" "$BASE/files/$fid" | jq -e '.deleted==true' >/dev/null

      - name: Realtime 101 (strict upgrade)
        run: |
          set -euo pipefail
          KEY=$(openssl rand -base64 16)
          CODE=$(curl --http1.1 -s -o /dev/null -w "%{http_code}" \
            -H "Connection: Upgrade" \
            -H "Upgrade: websocket" \
            -H "Sec-WebSocket-Version: 13" \
            -H "Sec-WebSocket-Key: $KEY" \
            "$REALTIME_BASE/realtime?model=$RT_MODEL")
          echo "WS status: $CODE"
          test "$CODE" = "101"
