name: ✅ Verify Relay Core

on:
  workflow_dispatch:
  push:
    paths:
      - '**.ts'
      - 'wrangler.toml'

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run health check
        shell: pwsh
        run: |
          $res = Invoke-RestMethod https://chatgpt-team.pages.dev/v1/health
          if (-not $res.ok) { throw "Health check failed" }
          Write-Host "✅ Relay OK"