name = "chatgpt-team"
compatibility_date = "2025-09-05"
pages_build_output_dir = "."

# Optional environment variables.  The values here are placeholders
# and should be overridden via `.dev.vars` for local development or
# via Cloudflare dashboard / `wrangler secret put` for production.
[vars]
# Primary API key names.  Do not set your real key here; instead, use
# `wrangler secret put` to store secrets securely.  These definitions
# exist solely to document the expected variable names.
OPENAI_KEY = ""
OPENAI_API_KEY = ""

# Organisation identifiers.  Only one needs to be set.
OPENAI_ORG_ID = ""
OPENAI_ORG = ""
OPENAI_ORGANIZATION = ""

# Project and beta flag.  Optional.
OPENAI_PROJECT = ""
OPENAI_BETA = ""

# Base URL used by clients to call the relay.  Leave blank to use the Pages
# domain.  In local development, set `BASE_URL` in `.dev.vars` to
# something like `http://127.0.0.1:8787/v1`.
BASE_URL = ""

# Upstream base override.  Leave blank to use https://api.openai.com for
# all proxied requests.  If set, this should be the full origin URL
# (without trailing slash) that the relay should forward to, e.g.,
# `https://some-other-endpoint`.
BASE = ""




