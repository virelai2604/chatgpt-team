openapi: 3.1.0
info:
  title: ChatGPT Team Relay (Extended)
  version: 1.1.0
servers:
  - url: https://chatgpt-team.pages.dev
paths:
  /v1/chat/completions:
    post:
      summary: Chat Completions (relay)
      operationId: createChatCompletion
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        "200":
          description: ChatCompletionResponse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
  /v1/responses:
    post:
      summary: Responses (unified, relay)
      operationId: createResponse
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Response payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/background:
    post:
      summary: Background job (relay alias to Responses with background:true)
      operationId: createBackgroundJob
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Background ID or status
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    ChatCompletionRequest:
      type: object
      properties:
        model: { type: string }
        messages:
          type: array
          items:
            type: object
            properties:
              role: { type: string, enum: [system, user, assistant, tool] }
              content: { oneOf: [{ type: string }, { type: array, items: { type: object } }] }
    ChatCompletionResponse:
      type: object
      additionalProperties: true
